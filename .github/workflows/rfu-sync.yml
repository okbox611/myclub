name: RFU Sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */6 * * *"

permissions:
  contents: write

concurrency:
  group: rfu-sync
  cancel-in-progress: false

jobs:
  sync-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sync RFU data
        run: npm run sync:rfu

      - name: Commit updated RFU data
        shell: bash
        run: |
          if git diff --quiet -- src/data/seniorRfuData.js; then
            echo "No RFU changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/data/seniorRfuData.js
          git commit -m "chore: sync RFU data"
          git push origin HEAD:main
